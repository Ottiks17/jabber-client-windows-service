<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Jabber Dashboard</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; background: #f0f2f5; }
        .container { max-width: 1400px; margin: 0 auto; }
        
        /* Header */
        h1 { color: #333; margin-bottom: 5px; }
        .subtitle { color: #666; margin-bottom: 30px; }
        
        /* Stats Grid */
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 10px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); transition: transform 0.2s; }
        .stat-card:hover { transform: translateY(-3px); }
        .stat-value { font-size: 42px; font-weight: bold; color: #667eea; }
        .stat-label { color: #666; margin-top: 10px; font-size: 14px; }
        
        /* Send Message Form */
        .send-form { background: white; border-radius: 10px; padding: 20px; margin-bottom: 30px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .send-form h3 { margin-top: 0; color: #333; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: #666; font-weight: bold; }
        .form-group input, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px; }
        .form-group textarea { resize: vertical; min-height: 80px; }
        .btn-send { background: #667eea; color: white; border: none; padding: 12px 30px; border-radius: 5px; cursor: pointer; font-size: 16px; transition: background 0.2s; }
        .btn-send:hover { background: #5a67d8; }
        .btn-send:disabled { background: #ccc; cursor: not-allowed; }
        .send-result { margin-top: 10px; padding: 10px; border-radius: 5px; display: none; }
        .send-result.success { background: #d4edda; color: #155724; display: block; }
        .send-result.error { background: #f8d7da; color: #721c24; display: block; }
        
        /* Messages Table */
        .messages { background: white; border-radius: 10px; padding: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #f5f5f5; font-weight: bold; color: #333; }
        tr:hover { background: #f9f9f9; }
        .status { display: inline-block; padding: 3px 8px; border-radius: 12px; font-size: 12px; font-weight: bold; }
        .status-sent { background: #4caf50; color: white; }
        .status-pending { background: #ff9800; color: white; }
        .loading { text-align: center; padding: 20px; color: #666; }
        .auto-refresh { font-size: 12px; color: #999; margin-top: 10px; text-align: right; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📡 Jabber Client Dashboard</h1>
        <div class="subtitle">Real-time monitoring and messaging</div>
        
        <div class="stats">
            <div class="stat-card"><div class="stat-value" id="total">0</div><div class="stat-label">Total Messages</div></div>
            <div class="stat-card"><div class="stat-value" id="sent">0</div><div class="stat-label">Sent</div></div>
            <div class="stat-card"><div class="stat-value" id="delivered">0</div><div class="stat-label">Delivered</div></div>
            <div class="stat-card"><div class="stat-value" id="read">0</div><div class="stat-label">Read</div></div>
        </div>
        
        <div class="send-form">
            <h3>✉️ Send Message</h3>
            <div class="form-group">
                <label>Recipient (JID):</label>
                <input type="text" id="recipient" placeholder="user@jabber.local" value="test@jabber.local">
            </div>
            <div class="form-group">
                <label>Message (max 256 chars):</label>
                <textarea id="message" placeholder="Enter your message here..."></textarea>
            </div>
            <button class="btn-send" id="sendBtn" onclick="sendMessage()">Send Message</button>
            <div id="sendResult" class="send-result"></div>
        </div>
        
        <div class="messages">
            <h3>📋 Recent Messages</h3>
            <div id="messages-container">
                <div class="loading">Loading messages...</div>
            </div>
            <div class="auto-refresh">Auto-refresh every 10 seconds</div>
        </div>
    </div>
    
    <script>
        async function sendMessage() {
            const recipient = document.getElementById('recipient').value;
            const message = document.getElementById('message').value;
            const sendBtn = document.getElementById('sendBtn');
            const resultDiv = document.getElementById('sendResult');
            
            if (!recipient) {
                showResult('Recipient is required', 'error');
                return;
            }
            if (!message) {
                showResult('Message is required', 'error');
                return;
            }
            if (message.length > 256) {
                showResult('Message exceeds 256 characters', 'error');
                return;
            }
            
            sendBtn.disabled = true;
            sendBtn.textContent = 'Sending...';
            resultDiv.style.display = 'none';
            
            try {
                const response = await fetch('/api/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        recipient: recipient,
                        message: message,
                        sender: 'web_dashboard'
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showResult(`✅ Message sent to ${recipient}`, 'success');
                    document.getElementById('message').value = '';
                    loadMessages();
                    loadStats();
                } else {
                    showResult(`❌ Error: ${data.error}`, 'error');
                }
            } catch (error) {
                showResult(`❌ Connection error: ${error.message}`, 'error');
            } finally {
                sendBtn.disabled = false;
                sendBtn.textContent = 'Send Message';
            }
        }
        
        function showResult(text, type) {
            const resultDiv = document.getElementById('sendResult');
            resultDiv.textContent = text;
            resultDiv.className = `send-result ${type}`;
            setTimeout(() => {
                resultDiv.style.display = 'none';
            }, 5000);
        }
        
        async function loadStats() {
            try {
                const response = await fetch('/api/dashboard/stats');
                const data = await response.json();
                document.getElementById('total').textContent = data.total;
                document.getElementById('sent').textContent = data.sent;
                document.getElementById('delivered').textContent = data.delivered;
                document.getElementById('read').textContent = data.read;
            } catch (error) {
                console.error('Stats error:', error);
            }
        }
        
        async function loadMessages() {
            try {
                const response = await fetch('/api/dashboard/messages');
                const data = await response.json();
                const container = document.getElementById('messages-container');
                
                if (!data.messages || data.messages.length === 0) {
                    container.innerHTML = '<div class="loading">No messages yet. Send one!</div>';
                    return;
                }
                
                let html = '<table><thead><tr><th>Type</th><th>From</th><th>To</th><th>Message</th><th>Status</th><th>Time</th></tr></thead><tbody>';
                for (const msg of data.messages.slice(0, 20)) {
                    const status = msg.sent_time ? 'sent' : 'pending';
                    const statusText = msg.sent_time ? 'Sent' : 'Pending';
                    html += `<tr>
                        <td><span class="status status-${status}">${msg.type}</span></td>
                        <td>${escapeHtml(msg.sender)}</td>
                        <td>${escapeHtml(msg.recipient)}</td>
                        <td style="max-width:300px; overflow:hidden; text-overflow:ellipsis;">${escapeHtml(msg.text)}</td>
                        <td><span class="status status-${status}">${statusText}</span></td>
                        <td>${msg.sent_time ? new Date(msg.sent_time).toLocaleString() : '-'}</td>
                    </tr>`;
                }
                html += '</tbody></table>';
                container.innerHTML = html;
            } catch (error) {
                console.error('Messages error:', error);
                document.getElementById('messages-container').innerHTML = '<div class="loading">Error loading messages</div>';
            }
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Initial load
        loadStats();
        loadMessages();
        
        // Auto-refresh
        setInterval(loadStats, 5000);
        setInterval(loadMessages, 10000);
    </script>
</body>
</html>
