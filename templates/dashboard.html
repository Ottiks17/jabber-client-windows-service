<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jabber Client Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        /* Header */
        .header {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 5px;
        }
        
        .header p {
            color: #666;
            font-size: 14px;
        }
        
        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            transition: transform 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
        }
        
        .stat-value {
            font-size: 48px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .stat-label {
            color: #666;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .stat-trend {
            margin-top: 10px;
            font-size: 12px;
            color: #4caf50;
        }
        
        /* Service Control */
        .service-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .service-status {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            margin-bottom: 15px;
        }
        
        .status-running {
            background: #4caf50;
            color: white;
        }
        
        .status-stopped {
            background: #f44336;
            color: white;
        }
        
        .status-starting {
            background: #ff9800;
            color: white;
        }
        
        .status-not_installed {
            background: #9e9e9e;
            color: white;
        }
        
        .service-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .btn-start {
            background: #4caf50;
            color: white;
        }
        
        .btn-start:hover {
            background: #45a049;
        }
        
        .btn-stop {
            background: #f44336;
            color: white;
        }
        
        .btn-stop:hover {
            background: #da190b;
        }
        
        .btn-refresh {
            background: #2196f3;
            color: white;
        }
        
        .btn-refresh:hover {
            background: #0b7dda;
        }
        
        /* Charts */
        .chart-container {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .chart-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #333;
        }
        
        canvas {
            max-height: 300px;
        }
        
        /* Messages Table */
        .messages-table {
            background: white;
            border-radius: 15px;
            padding: 20px;
            overflow-x: auto;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        
        th {
            background: #f5f5f5;
            font-weight: bold;
            color: #333;
        }
        
        tr:hover {
            background: #f9f9f9;
        }
        
        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
        }
        
        .status-sent {
            background: #4caf50;
            color: white;
        }
        
        .status-pending {
            background: #ff9800;
            color: white;
        }
        
        .status-read {
            background: #2196f3;
            color: white;
        }
        
        .pagination {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 10px;
        }
        
        .page-btn {
            padding: 5px 10px;
            border: 1px solid #ddd;
            background: white;
            cursor: pointer;
            border-radius: 5px;
        }
        
        .page-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        
        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }
        
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        
        .live-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: #4caf50;
            border-radius: 50%;
            animation: pulse 1s infinite;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Jabber Client Dashboard</h1>
            <p>Real-time monitoring and management</p>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="totalMessages">0</div>
                <div class="stat-label">Total Messages</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="sentMessages">0</div>
                <div class="stat-label">Sent</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="deliveredMessages">0</div>
                <div class="stat-label">Delivered</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="readMessages">0</div>
                <div class="stat-label">Read</div>
                <div class="stat-trend" id="successRate">Success rate: 0%</div>
            </div>
        </div>
        
        <div class="service-card">
            <div id="serviceStatus" class="service-status status-stopped">Checking...</div>
            <div class="service-buttons">
                <button class="btn btn-start" onclick="startService()">▶ Start Service</button>
                <button class="btn btn-stop" onclick="stopService()">⏹ Stop Service</button>
                <button class="btn btn-refresh" onclick="refreshStats()">🔄 Refresh</button>
            </div>
        </div>
        
        <div class="chart-container">
            <div class="chart-title">Messages by Source</div>
            <canvas id="sourceChart"></canvas>
        </div>
        
        <div class="chart-container">
            <div class="chart-title">Messages per Hour (Last 24h)</div>
            <canvas id="hourlyChart"></canvas>
        </div>
        
        <div class="messages-table">
            <div class="chart-title">Recent Messages <span class="live-indicator"></span></div>
            <div id="messagesList">
                <div class="loading">Loading messages...</div>
            </div>
            <div id="pagination" class="pagination"></div>
        </div>
    </div>
    
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        let socket = io();
        let sourceChart = null;
        let hourlyChart = null;
        let currentPage = 1;
        
        socket.on('connect', function() {
            console.log('Connected to server');
        });
        
        socket.on('update', function(data) {
            updateStats(data.stats);
            updateServiceStatus(data.service_status);
            updateRecentMessages(data.recent_messages);
        });
        
        function updateStats(stats) {
            document.getElementById('totalMessages').textContent = stats.total;
            document.getElementById('sentMessages').textContent = stats.sent;
            document.getElementById('deliveredMessages').textContent = stats.delivered;
            document.getElementById('readMessages').textContent = stats.read;
            const rate = stats.total > 0 ? (stats.delivered / stats.total * 100).toFixed(1) : 0;
            document.getElementById('successRate').textContent = Success rate: %;
        }
        
        function updateServiceStatus(status) {
            const statusElement = document.getElementById('serviceStatus');
            let statusClass = '';
            let statusText = '';
            
            switch(status) {
                case 'running':
                    statusClass = 'status-running';
                    statusText = '● Service Running';
                    break;
                case 'stopped':
                    statusClass = 'status-stopped';
                    statusText = '● Service Stopped';
                    break;
                case 'starting':
                    statusClass = 'status-starting';
                    statusText = '● Service Starting';
                    break;
                default:
                    statusClass = 'status-not_installed';
                    statusText = '● Service Not Installed';
            }
            
            statusElement.className = service-status ;
            statusElement.textContent = statusText;
        }
        
        function updateRecentMessages(messages) {
            if (!messages || messages.length === 0) {
                document.getElementById('messagesList').innerHTML = '<div class="loading">No messages yet</div>';
                return;
            }
            
            let html = '<table><thead><tr>';
            html += '<th>Type</th><th>From</th><th>To</th><th>Message</th><th>Status</th><th>Time</th>';
            html += '</tr></thead><tbody>';
            
            messages.forEach(msg => {
                let status = 'pending';
                let statusText = 'Pending';
                if (msg.read_time) {
                    status = 'read';
                    statusText = 'Read';
                } else if (msg.delivered_time) {
                    status = 'delivered';
                    statusText = 'Delivered';
                } else if (msg.sent_time) {
                    status = 'sent';
                    statusText = 'Sent';
                }
                
                html += '<tr>';
                html += <td><span class="status-badge" style="background:#667eea"></span></td>;
                html += <td></td>;
                html += <td></td>;
                html += <td style="max-width:300px; overflow:hidden; text-overflow:ellipsis;"></td>;
                html += <td><span class="status-badge status-"></span></td>;
                html += <td></td>;
                html += '</tr>';
            });
            
            html += '</tbody></table>';
            document.getElementById('messagesList').innerHTML = html;
        }
        
        function refreshStats() {
            fetch('/api/dashboard/stats')
                .then(res => res.json())
                .then(data => {
                    if (!data.error) {
                        updateStats(data);
                        updateCharts(data);
                    }
                });
            
            fetch('/api/dashboard/service/status')
                .then(res => res.json())
                .then(data => updateServiceStatus(data.status));
            
            loadMessages(currentPage);
        }
        
        function updateCharts(data) {
            if (sourceChart) {
                sourceChart.data.datasets[0].data = Object.values(data.by_source);
                sourceChart.data.labels = Object.keys(data.by_source);
                sourceChart.update();
            }
            
            if (hourlyChart) {
                hourlyChart.data.datasets[0].data = Object.values(data.hourly);
                hourlyChart.data.labels = Object.keys(data.hourly);
                hourlyChart.update();
            }
        }
        
        function loadMessages(page) {
            currentPage = page;
            fetch(/api/dashboard/messages?page=&per_page=10)
                .then(res => res.json())
                .then(data => {
                    if (!data.error) {
                        updateRecentMessages(data.messages);
                        updatePagination(data.page, data.total_pages);
                    }
                });
        }
        
        function updatePagination(current, total) {
            let html = '';
            for (let i = 1; i <= Math.min(total, 5); i++) {
                html += <button class="page-btn " onclick="loadMessages()"></button>;
            }
            if (total > 5) {
                html += <span>...</span>;
                html += <button class="page-btn" onclick="loadMessages()"></button>;
            }
            document.getElementById('pagination').innerHTML = html;
        }
        
        function startService() {
            fetch('/api/dashboard/service/start', {method: 'POST'})
                .then(() => refreshStats());
        }
        
        function stopService() {
            fetch('/api/dashboard/service/stop', {method: 'POST'})
                .then(() => refreshStats());
        }
        
        // Initialize charts
        function initCharts() {
            const sourceCtx = document.getElementById('sourceChart').getContext('2d');
            sourceChart = new Chart(sourceCtx, {
                type: 'pie',
                data: {
                    labels: [],
                    datasets: [{
                        data: [],
                        backgroundColor: ['#667eea', '#764ba2', '#f093fb', '#4facfe']
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true
                }
            });
            
            const hourlyCtx = document.getElementById('hourlyChart').getContext('2d');
            hourlyChart = new Chart(hourlyCtx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: 'Messages',
                        data: [],
                        borderColor: '#667eea',
                        backgroundColor: 'rgba(102, 126, 234, 0.1)',
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true
                }
            });
        }
        
        // Auto-refresh every 30 seconds
        setInterval(() => {
            refreshStats();
        }, 30000);
        
        // Initial load
        initCharts();
        refreshStats();
    </script>
</body>
</html>
